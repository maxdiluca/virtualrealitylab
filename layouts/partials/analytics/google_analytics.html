{{ $ga := site.Params.marketing.analytics.google_analytics | default "" }}

{{ if hugo.IsProduction | and $ga }}
  {{ $gtagConfig := cond site.Params.features.privacy_pack.enable "{ 'anonymize_ip': true }" "{}" }}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ $ga }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    function trackOutboundLink(url, target) {
      gtag('event', 'click', {
        'event_category': 'outbound',
        'event_label': url,
        'transport_type': 'beacon',
        'event_callback': function () {
          if (target !== '_blank') {
            document.location = url;
          }
        }
      });
    }

    function onClickCallback(event) {
      if ((event.target.tagName !== 'A') || (event.target.host === window.location.host)) {
        return;
      }
      trackOutboundLink(event.target.href, event.target.getAttribute('target'));
    }

    gtag('js', new Date());
    gtag('config', '{{ $ga }}', {{ $gtagConfig | safeJS }});
    gtag('set', {'cookie_flags': 'SameSite=None;Secure'});

    document.addEventListener('click', onClickCallback, false);
  </script>
{{ end }}
