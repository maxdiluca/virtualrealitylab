<style>
  .footer-license-icons.footer-license-icons-with-internal {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.45rem;
  }

  .footer-internal-links {
    display: inline-flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-left: 0.4rem;
    font-size: 0.78rem;
  }

  .footer-internal-links::before {
    content: "|";
    color: rgba(0, 0, 0, 0.35);
    margin-right: 0.15rem;
  }

  .footer-internal-links a {
    white-space: nowrap;
  }

  .footer-internal-label {
    font-weight: 600;
  }

  @media (prefers-color-scheme: dark) {
    .footer-internal-links::before {
      color: rgba(255, 255, 255, 0.35);
    }
  }
</style>

<template id="footer-internal-links-template">
  <span class="footer-internal-links" aria-label="Internal links">
    <span class="footer-internal-label">Internal:</span>
    <a href="https://bham.sharepoint.com/sites/LES-PSY-VRLab">SharePoint Wiki</a>
    <span aria-hidden="true">·</span>
    <a href="https://teams.microsoft.com/l/team/19%3AvhCl5BNPrgqEcGePBb_ZD8r9jXkHdzrtz_ZgcC85sL81%40thread.tacv2/conversations?groupId=6812d02e-2a15-47e0-a4cd-d1a042cbffcf&amp;tenantId=b024cacf-dede-4241-a15c-3c97d553e9f3">Teams</a>
    <span aria-hidden="true">·</span>
    <a href="/site_maintenance/">Site Maintenance</a>
  </span>
</template>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const icons = document.querySelector('.footer-license-icons');
    const template = document.querySelector('#footer-internal-links-template');
    if (!icons || !template || icons.querySelector('.footer-internal-links')) {
      return;
    }
    icons.classList.add('footer-license-icons-with-internal');
    icons.appendChild(template.content.cloneNode(true));
  });
</script>
